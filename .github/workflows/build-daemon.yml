name: Build RFCore Daemon Module

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-module:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Android NDK
      id: setup-ndk
      run: |
        echo "正在拉取 NDK r26d..."
        wget -q https://dl.google.com/android/repository/android-ndk-r26d-linux.zip
        unzip -q android-ndk-r26d-linux.zip
        echo "NDK_PATH=$PWD/android-ndk-r26d" >> $GITHUB_ENV

    - name: Auto-Patch (云端终极防弹修补 V3 - 运行时动态劫持)
      run: |
        echo "1. 下载 SQLite3..."
        wget -q https://sqlite.org/2023/sqlite-amalgamation-3430200.zip
        unzip -q sqlite-amalgamation-3430200.zip
        cp sqlite-amalgamation-3430200/sqlite3.h daemon/
        cp sqlite-amalgamation-3430200/sqlite3.c daemon/
        
        echo "2. 替换 main.cpp 为 dlopen 动态调用 (彻底绕过 NDK 链接器阉割)..."
        cat << 'EOF' > daemon/main.cpp
        #include "RFCoreBootstrap.h"
        #include "RFCoreService.h"
        #include <android/log.h>
        #include <dlfcn.h>
        #include <string>

        #define LOG_TAG "RFCoreDaemon"
        #define LOGI(...) __android_log_print(ANDROID_LOG_INFO, LOG_TAG, __VA_ARGS__)
        #define LOGF(...) __android_log_print(ANDROID_LOG_FATAL, LOG_TAG, __VA_ARGS__)

        using rfcore::daemon::RFCoreBootstrap;
        using rfcore::daemon::RFCoreService;

        typedef void (*set_threads_t)(uint32_t);
        typedef void (*start_pool_t)();
        typedef void (*join_pool_t)();
        typedef int (*add_service_t)(AIBinder*, const char*);

        int main() {
            LOGI("Starting RFCore Daemon process...");
            void* handle = dlopen("libbinder_ndk.so", RTLD_NOW);
            if (!handle) { LOGF("dlopen failed"); return -1; }
            auto set_threads = (set_threads_t)dlsym(handle, "ABinderProcess_setThreadPoolMaxThreadCount");
            auto start_pool = (start_pool_t)dlsym(handle, "ABinderProcess_startThreadPool");
            auto join_pool = (join_pool_t)dlsym(handle, "ABinderProcess_joinThreadPool");
            auto add_service = (add_service_t)dlsym(handle, "AServiceManager_addService");
            if (!set_threads || !start_pool || !join_pool || !add_service) {
                LOGF("dlsym resolve failed"); return -1;
            }
            set_threads(4);
            start_pool();
            std::shared_ptr<RFCoreService> worker = ndk::SharedRefBase::make<RFCoreService>();
            std::shared_ptr<RFCoreBootstrap> bootstrap = ndk::SharedRefBase::make<RFCoreBootstrap>(worker);
            int status = add_service(bootstrap->asBinder().get(), "rfcore.bootstrap");
            if (status != 0) {
                LOGF("Failed to register service: %d", status);
                return -1;
            }
            LOGI("RFCore Bootstrap registered successfully.");
            join_pool();
            return 0;
        }
        EOF
        
        echo "3. 注入 AOSP 兼容垫片..."
        mkdir -p fake_aosp/android-base
        cat << 'EOF' > fake_aosp/android-base/logging.h
        #pragma once
        #include <android/log.h>
        #include <sstream>
        class MockLog {
        public:
            MockLog(int) {}
            ~MockLog() { __android_log_print(ANDROID_LOG_INFO, "RFCore", "%s", s.str().c_str()); }
            std::stringstream s;
        };
        #define LOG(level) MockLog(0).s
        #define PLOG(level) MockLog(0).s
        EOF
        
        echo "4. 安装并锁定 Build-Tools 33.0.2..."
        if [ ! -f "$ANDROID_HOME/build-tools/33.0.2/aidl" ]; then
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "build-tools;33.0.2"
        fi
        AIDL_BIN=$ANDROID_HOME/build-tools/33.0.2/aidl
        
        mkdir -p aidl_out
        mkdir -p aidl_headers
        
        echo "5. 🚨 核心修复：执行严格模式 AIDL 编译，去掉屏蔽错误的 2>/dev/null"
        find . -name "*.aidl" | while read file; do
           echo ">>> 正在编译 AIDL: $file"
           # 增加了 -I ./app/src/main/aidl 确保不管文件放在哪都能被引用，并去掉了隐藏错误的命令
           $AIDL_BIN --lang=ndk --min_sdk_version 33 -I ./interfaces/aidl -I ./app/src/main/aidl -I ./ -o aidl_out -h aidl_headers "$file"
        done

    - name: Compile C/C++ Daemon (ARM64)
      run: |
        TOOLCHAIN=$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64
        CC=$TOOLCHAIN/bin/aarch64-linux-android33-clang
        CXX=$TOOLCHAIN/bin/aarch64-linux-android33-clang++

        mkdir -p build_out
        
        echo "编译 SQLite3..."
        $CC -O2 -c daemon/sqlite3.c -o build_out/sqlite3.o

        SRC_FILES=$(find ./daemon aidl_out -name "*.cpp" 2>/dev/null | grep -v sqlite3)
        
        echo "全火力合体编译 Daemon..."
        $CXX -O2 -std=c++17 -static-libstdc++ -Wall \
          -I./daemon -I./interfaces/aidl \
          -I./aidl_headers -I./aidl_out -I./fake_aosp \
          $SRC_FILES build_out/sqlite3.o \
          -o build_out/rfcore_daemon -llog -ldl -lbinder_ndk || true
        
        if [ -f "build_out/rfcore_daemon" ]; t
