name: Build RFCore Daemon Module

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-module:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Android NDK (r25c)
      id: setup-ndk
      run: |
        export NDK_PATH=$ANDROID_HOME/ndk/25.2.9519653
        if [ ! -d "$NDK_PATH" ]; then
          wget -q https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
          unzip -q android-ndk-r25c-linux.zip
          NDK_PATH=$PWD/android-ndk-r25c
        fi
        echo "NDK_PATH=$NDK_PATH" >> $GITHUB_ENV

    - name: Compile C++ Daemon (ARM64)
      run: |
        TOOLCHAIN=$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64
        CXX=$TOOLCHAIN/bin/aarch64-linux-android29-clang++

        mkdir -p build_out

        # 1. 智能寻址：查找 daemon 和 interfaces 目录下的所有 C++ 源码
        SRC_FILES=$(find daemon interfaces -name "*.cpp" 2>/dev/null)
        
        # 2. 编译并自动将 daemon 和 interfaces 设为头文件搜索路径 (-I)
        # 这样无论你的 #include 怎么写，都不会报找不到头文件的错误
        $CXX -O2 -static-libstdc++ -Wall -I./daemon -I./interfaces $SRC_FILES -o build_out/rfcore_daemon
        
        echo "Daemon 二进制编译完成！"

    - name: Assemble Magisk/KernelSU Module
      run: |
        mkdir -p module/system/bin
        
        # 智能寻址：直接从根目录把你的 Magisk 模板和 SEPolicy 规则拷进去
        cp -r Magisk_module/* module/ 2>/dev/null || true
        cp -r sepolicy/* module/ 2>/dev/null || true
        
        cp build_out/rfcore_daemon module/system/bin/
        chmod +x module/system/bin/rfcore_daemon
        chmod +x module/*.sh 2>/dev/null || true

        cd module
        zip -r9 ../RFCore-Module-Release.zip ./*

    - name: Upload Module Artifact
      uses: actions/upload-artifact@v4
      with:
        name: RFCore-Module-ZIP
        path: RFCore-Module-Release.zip

