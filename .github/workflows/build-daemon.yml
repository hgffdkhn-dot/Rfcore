name: Build RFCore Daemon Module

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-module:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Android NDK
      id: setup-ndk
      run: |
        echo "正在拉取 NDK r26d..."
        wget -q https://dl.google.com/android/repository/android-ndk-r26d-linux.zip
        unzip -q android-ndk-r26d-linux.zip
        echo "NDK_PATH=$PWD/android-ndk-r26d" >> $GITHUB_ENV

    - name: Auto-Patch (云端终极防弹修补)
      run: |
        echo "1. 下载 SQLite3..."
        wget -q https://sqlite.org/2023/sqlite-amalgamation-3430200.zip
        unzip -q sqlite-amalgamation-3430200.zip
        cp sqlite-amalgamation-3430200/sqlite3.h daemon/
        cp sqlite-amalgamation-3430200/sqlite3.c daemon/
        
        echo "2. 暴力解决 binder_manager.h 缺失 (注入底层 C 符号)..."
        # 删掉找不到的头文件
        sed -i '/#include <android\/binder_manager.h>/d' daemon/main.cpp 2>/dev/null || true
        # 强行在文件头部注入底层接口声明，绕过头文件检查直达 .so 库
        sed -i '1i struct AIBinder;\nextern "C" int AServiceManager_addService(AIBinder* binder, const char* instance);' daemon/main.cpp 2>/dev/null || true
        
        echo "3. 注入 AOSP 兼容垫片 (保护你的其他旧文件)..."
        mkdir -p fake_aosp/android-base
        cat << 'EOF' > fake_aosp/android-base/logging.h
        #pragma once
        #include <android/log.h>
        #include <sstream>
        class MockLog {
        public:
            MockLog(int) {}
            ~MockLog() { __android_log_print(ANDROID_LOG_INFO, "RFCore", "%s", s.str().c_str()); }
            std::stringstream s;
        };
        #define LOG(level) MockLog(0).s
        #define PLOG(level) MockLog(0).s
        EOF
        
        echo "4. 安装并锁定 Build-Tools 33.0.2 (解决代沟报错)..."
        if [ ! -f "$ANDROID_HOME/build-tools/33.0.2/aidl" ]; then
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "build-tools;33.0.2"
        fi
        AIDL_BIN=$ANDROID_HOME/build-tools/33.0.2/aidl
        
        mkdir -p aidl_out
        mkdir -p aidl_headers
        find . -name "*.aidl" | while read file; do
           $AIDL_BIN --lang=ndk --min_sdk_version 33 -I ./interfaces/aidl -I ./interfaces -I ./ -o aidl_out -h aidl_headers $file 2>/dev/null || true
        done

    - name: Compile C/C++ Daemon (ARM64)
      run: |
        TOOLCHAIN=$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64
        CC=$TOOLCHAIN/bin/aarch64-linux-android33-clang
        CXX=$TOOLCHAIN/bin/aarch64-linux-android33-clang++

        mkdir -p build_out
        
        echo "编译 SQLite3..."
        $CC -O2 -c daemon/sqlite3.c -o build_out/sqlite3.o

        SRC_FILES=$(find ./daemon aidl_out -name "*.cpp" 2>/dev/null | grep -v sqlite3)
        
        echo "全火力合体编译 Daemon..."
        $CXX -O2 -std=c++17 -static-libstdc++ -Wall \
          -I./daemon -I./interfaces/aidl \
          -I./aidl_headers -I./aidl_out -I./fake_aosp \
          $SRC_FILES build_out/sqlite3.o \
          -o build_out/rfcore_daemon -llog -ldl -lbinder_ndk || true
        
        if [ -f "build_out/rfcore_daemon" ]; then
            echo "Daemon 编译成功！"
        else
            echo "Daemon 编译失败，请查看错误日志。"
            exit 1
        fi

    - name: Assemble Magisk/KernelSU Module
      run: |
        mkdir -p module/system/bin
        cp -r Magisk_module/* module/ 2>/dev/null || true
        cp -r sepolicy/* module/ 2>/dev/null || true
        cp build_out/rfcore_daemon module/system/bin/
        chmod +x module/system/bin/rfcore_daemon
        chmod +x module/*.sh 2>/dev/null || true

        cd module
        zip -r9 ../RFCore-Module-Release.zip ./*

    - name: Upload Module Artifact
      uses: actions/upload-artifact@v4
      with:
        name: RFCore-Module-ZIP
        path: RFCore-Module-Release.zip

